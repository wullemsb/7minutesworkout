<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0f1e"/>
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Large "7" -->
  <text x="80" y="360" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="320" fill="url(#g1)">7</text>
  <!-- Small "MIN" label -->
  <text x="310" y="440" font-family="Arial, sans-serif" font-weight="700"
        font-size="68" fill="#94a3b8" letter-spacing="6">MIN</text>
</svg>
